; =============================================================
; PrinterCam - PlatformIO Project Configuration
; =============================================================
;
; This file tells PlatformIO:
;   - What board we're building for (ESP32-CAM)
;   - What framework to use (Arduino)
;   - How fast to upload and monitor serial output
;   - What compiler flags to enable (PSRAM support)
;
; To build and upload:
;   1. Click the "Upload" button (right arrow icon) in PlatformIO
;   2. Or run: pio run --target upload
;
; To open Serial Monitor:
;   1. Click the "Serial Monitor" button (plug icon) in PlatformIO
;   2. Or run: pio device monitor
; =============================================================

[env:esp32cam]
; --- Board and Framework ---
; "espressif32" is the platform (chip family)
; "esp32cam" is the specific board (AI Thinker ESP32-CAM)
; "arduino" is the framework (gives us familiar Arduino functions)
platform = espressif32
board = esp32cam
framework = arduino

; --- Serial Monitor ---
; Baud rate must match Serial.begin() in our code (115200)
; This is the speed at which debug messages are sent over USB
monitor_speed = 115200

; --- Upload Speed ---
; How fast firmware is sent to the board over USB
; 460800 is fast but reliable for most USB-to-serial chips
upload_speed = 460800

; --- Partition Table ---
; The ESP32's 4MB flash is divided into partitions for different purposes.
; "huge_app.csv" gives us ~3MB for our application code.
; We need this because the camera driver + WiFi + HTTP server is large.
; (The default partition only gives ~1.3MB which isn't enough)
board_build.partitions = huge_app.csv

; --- Build Flags (Compiler Options) ---
; -DBOARD_HAS_PSRAM: Tells the ESP32 to enable its 4MB of extra RAM (PSRAM)
;   The camera uses PSRAM for frame buffers at higher resolutions
; -mfix-esp32-psram-cache-issue: Fixes a known hardware bug with PSRAM caching
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
